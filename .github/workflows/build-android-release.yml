name: Build y publicar APK de Android

# Se dispara al pushear un tag con formato vX.Y.Z, ej.:
#   git tag v0.2.0 && git push --tags
#
# Hace todo el flujo que antes era manual:
#   1. Instala dependencias (Node, Rust, Android SDK/NDK)
#   2. Restaura el keystore de firma desde los secrets
#   3. Buildea el frontend (Next export) y el APK universal firmado
#   4. Crea el GitHub Release con el tag
#   5. Sube el .apk como asset del release
#
# Requiere estos secrets ya configurados en el repo (Settings → Secrets and
# variables → Actions):
#   ANDROID_KEYSTORE_BASE64
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # necesario para crear el Release y subir el asset

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache de Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Instalar NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Configurar NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Instalar dependencias de npm
        run: npm ci

      - name: Instalar Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Restaurar el keystore de firma
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p src-tauri/gen/android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/src-tauri/gen/android/upload-keystore.jks"

      - name: Inicializar el proyecto Android de Tauri
        # Siempre se borra gen/android antes de generarlo de nuevo: si quedara
        # a medio generar (de un run anterior, de un residuo de checkout, o de
        # cuando esta carpeta todavía estaba commiteada por error en el repo),
        # `tauri android init` se niega a correr con un error de "Project
        # directory ... does not exist" en vez de sobreescribir solo. Partir
        # siempre de cero es lo único que garantiza que quede sincronizado con
        # el tauri.conf.json / Cargo.toml actuales.
        run: |
          rm -rf src-tauri/gen/android
          npx tauri android init

      - name: Configurar firma de release
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          # storeFile con ruta ABSOLUTA — con ruta relativa, Gradle la resuelve
          # distinto según si evalúa keystore.properties desde la raíz del
          # proyecto Android o desde el módulo app/, y termina buscando en el
          # lugar equivocado (error real que tuvimos: "Keystore file
          # .../app/upload-keystore.jks not found").
          cat > src-tauri/gen/android/keystore.properties << EOF
          password=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          storeFile=$GITHUB_WORKSPACE/src-tauri/gen/android/upload-keystore.jks
          EOF

      - name: Aplicar signingConfig al build.gradle.kts
        # `tauri android init` no deja el build de "release" firmado por
        # defecto — hay que declarar el signingConfig a mano y asignarlo al
        # buildType release, o Gradle sigue generando *-unsigned.apk aunque
        # keystore.properties exista. Ver https://github.com/tauri-apps/tauri/issues/10313
        #
        # La estructura real que genera `tauri android init` (Tauri 2.0 RC)
        # usa `getByName("release") { ... }` dentro de buildTypes, y ya
        # importa java.util.Properties arriba para leer tauri.properties —
        # el patch reusa esa instancia en vez de crear una nueva.
        run: |
          GRADLE_FILE="src-tauri/gen/android/app/build.gradle.kts"

          if grep -q "keystorePropertiesFile" "$GRADLE_FILE"; then
            echo "El build.gradle.kts ya tiene signingConfig, no se toca."
            exit 0
          fi

          python3 - "$GRADLE_FILE" << 'PYEOF'
          import re
          import sys

          path = sys.argv[1]
          with open(path, "r") as f:
              contenido = f.read()

          # 1. Carga de keystore.properties, insertada después del import de
          #    Properties que ya existe (no duplicamos el import).
          preamble = '''import java.io.FileInputStream

          val keystorePropertiesFile = rootProject.file("keystore.properties")
          val keystoreProperties = Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
          }
          '''
          contenido = contenido.replace(
              "import java.util.Properties\n",
              "import java.util.Properties\n" + preamble,
              1,
          )

          # 2. Inserta signingConfigs dentro de android { ... }, antes de
          #    defaultConfig para que quede declarado primero.
          signing_block = '''    signingConfigs {
                  create("release") {
                      keyAlias = keystoreProperties["keyAlias"] as String?
                      keyPassword = keystoreProperties["keyPassword"] as String?
                      storeFile = keystoreProperties["storeFile"]?.let { file(it) }
                      storePassword = keystoreProperties["password"] as String?
                  }
              }
          '''
          contenido = re.sub(r"(android\s*\{\n)", r"\1" + signing_block, contenido, count=1)

          # 3. Asigna signingConfig al buildType release, que en este proyecto
          #    usa la sintaxis getByName("release") { ... } (con llaves que
          #    pueden tener contenido multilínea, por eso el match no es codicioso).
          patron_release = re.compile(
              r'(getByName\("release"\)\s*\{)', re.DOTALL
          )
          contenido, n = patron_release.subn(
              r'\1\n            signingConfig = signingConfigs.getByName("release")',
              contenido,
              count=1,
          )

          with open(path, "w") as f:
              f.write(contenido)

          assert "signingConfigs" in contenido, "No se pudo insertar signingConfigs — revisar build.gradle.kts a mano."
          assert n == 1, "No se encontró el bloque getByName(\"release\") { — revisar build.gradle.kts a mano."

          print("build.gradle.kts parcheado con signingConfig de release.")
          PYEOF

      - name: Verificar que el gradle quedó con signing
        run: |
          grep -q "signingConfigs" src-tauri/gen/android/app/build.gradle.kts || {
            echo "::error::build.gradle.kts no tiene signingConfigs — el APK saldría sin firmar."
            cat src-tauri/gen/android/app/build.gradle.kts
            exit 1
          }

      - name: Build del APK universal (release, firmado)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_FORMSPREE_ID: ${{ secrets.NEXT_PUBLIC_FORMSPREE_ID }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
        run: npx tauri android build --apk

      - name: Ubicar el .apk generado
        id: apk
        run: |
          APK_PATH=$(find src-tauri/gen/android -iname "*universal-release*.apk" ! -iname "*unsigned*" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No se encontró un .apk firmado. Archivos disponibles:" >&2
            find src-tauri/gen/android -iname "*.apk" >&2
            exit 1
          fi
          echo "APK encontrado: $APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Crear el Release y subir el APK
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
