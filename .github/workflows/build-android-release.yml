name: Build y publicar APK de Android

# Se dispara al pushear un tag con formato vX.Y.Z, ej.:
#   git tag v0.2.0 && git push --tags
#
# Hace todo el flujo que antes era manual:
#   1. Instala dependencias (Node, Rust, Android SDK/NDK)
#   2. Restaura el keystore de firma desde los secrets
#   3. Buildea el frontend (Next export) y el APK universal firmado
#   4. Crea el GitHub Release con el tag
#   5. Sube el .apk como asset del release
#
# Requiere estos secrets ya configurados en el repo (Settings → Secrets and
# variables → Actions):
#   ANDROID_KEYSTORE_BASE64
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # necesario para crear el Release y subir el asset

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache de Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Instalar NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Instalar dependencias de npm
        run: npm ci

      - name: Instalar Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Restaurar el keystore de firma
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p src-tauri/gen/android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/upload-keystore.jks

      - name: Inicializar el proyecto Android de Tauri (si no existe)
        run: |
          if [ ! -f src-tauri/gen/android/app/build.gradle.kts ] && [ ! -f src-tauri/gen/android/app/build.gradle ]; then
            npx tauri android init
          fi

      - name: Configurar firma de release
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          cat > src-tauri/gen/android/keystore.properties << EOF
          password=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          storeFile=upload-keystore.jks
          EOF

      - name: Build del APK universal (release, firmado)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_FORMSPREE_ID: ${{ secrets.NEXT_PUBLIC_FORMSPREE_ID }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
        run: npx tauri android build --apk

      - name: Ubicar el .apk generado
        id: apk
        run: |
          APK_PATH=$(find src-tauri/gen/android -iname "*universal-release*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No se encontró el .apk generado." >&2
            exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Crear el Release y subir el APK
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
